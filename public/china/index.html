<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>华语专区 | Secret Language Trade</title>
    <style>
      :root {
        --clearance: max(4px, env(safe-area-inset-bottom));
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        overflow: hidden;
      }

      body {
        min-height: 100svh;
        height: 100svh;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .poster {
        position: relative;
        width: min(100vw, 590px, calc((100svh - var(--clearance)) * 590 / 1280));
        aspect-ratio: 590 / 1280;
        overflow: hidden;
        background: #000;
        flex: 0 0 auto;
        isolation: isolate;
      }

      @supports (height: 100dvh) {
        body {
          min-height: 100dvh;
          height: 100dvh;
        }

        .poster {
          width: min(100vw, 590px, calc((100dvh - var(--clearance)) * 590 / 1280));
        }
      }

      .slice,
      .card-link,
      .card-link img {
        position: absolute;
        display: block;
      }

      .slice,
      .card-link img {
        width: 100%;
        height: 100%;
        object-fit: fill;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
      }

      .rail-left {
        left: 0%;
        top: 0%;
        width: 6.1017%;
        height: 100%;
      }

      .rail-right {
        left: 93.8983%;
        top: 0%;
        width: 6.1017%;
        height: 100%;
      }

      .rules {
        left: 6.6102%;
        top: 2.8906%;
        width: 87.1186%;
        height: 14.8438%;
      }

      .hero {
        left: 3.3898%;
        top: 16.5625%;
        width: 93.2203%;
        height: 22.8125%;
      }

      .card-link {
        width: 24.7458%;
        height: 14.375%;
        border-radius: 4px;
        overflow: hidden;
        text-decoration: none;
        -webkit-tap-highlight-color: transparent;
      }

      .card-link:focus-visible {
        outline: 2px solid #fff;
        outline-offset: 3px;
      }

      .card-link.is-active {
        filter: brightness(1.12) saturate(1.08);
      }

      .col-1 {
        left: 8.1356%;
      }

      .col-2 {
        left: 37.6271%;
      }

      .col-3 {
        left: 67.2881%;
      }

      .row-1 {
        top: 39.375%;
      }

      .row-2 {
        top: 55%;
      }

      .row-3 {
        top: 70.2344%;
      }

      .row-4 {
        top: 85.4688%;
      }
    </style>
  </head>
  <body>
    <main class="poster" aria-label="华语商品分类">
      <img class="slice rail-left" src="../assets/china-slices/rail-left.png" alt="">
      <img class="slice rail-right" src="../assets/china-slices/rail-right.png" alt="">
      <img class="slice rules" src="../assets/china-slices/rules.png" alt="私域客户满99包邮，电商八折一件代发，代理商合作7折进货">
      <img class="slice hero" src="../assets/china-slices/hero.png" alt="品质与价格是我们公开的武器">

      <a class="card-link col-1 row-1" href="#panty" data-item="panty" aria-label="进入内裤分类">
        <img src="../assets/china-slices/card-panty.png" alt="">
      </a>
      <a class="card-link col-2 row-1" href="#bra" data-item="bra" aria-label="进入胸罩分类">
        <img src="../assets/china-slices/card-bra.png" alt="">
      </a>
      <a class="card-link col-3 row-1" href="#top" data-item="top" aria-label="进入上衣分类">
        <img src="../assets/china-slices/card-top.png" alt="">
      </a>

      <a class="card-link col-1 row-2" href="#skirt" data-item="skirt" aria-label="进入裙子短裤分类">
        <img src="../assets/china-slices/card-skirt.png" alt="">
      </a>
      <a class="card-link col-2 row-2" href="#dress" data-item="dress" aria-label="进入连衣裙分类">
        <img src="../assets/china-slices/card-dress.png" alt="">
      </a>
      <a class="card-link col-3 row-2" href="#stockings" data-item="stockings" aria-label="进入丝袜分类">
        <img src="../assets/china-slices/card-stockings.png" alt="">
      </a>

      <a class="card-link col-1 row-3" href="#bodysuit" data-item="bodysuit" aria-label="进入贴身连体衣分类">
        <img src="../assets/china-slices/card-bodysuit.png" alt="">
      </a>
      <a class="card-link col-2 row-3" href="#roleplay" data-item="roleplay" aria-label="进入角色扮演分类">
        <img src="../assets/china-slices/card-roleplay.png" alt="">
      </a>
      <a class="card-link col-3 row-3" href="#pants" data-item="pants" aria-label="进入长裤分类">
        <img src="../assets/china-slices/card-pants.png" alt="">
      </a>

      <a class="card-link col-1 row-4" href="#hat" data-item="hat" aria-label="进入帽子分类">
        <img src="../assets/china-slices/card-hat.png" alt="">
      </a>
      <a class="card-link col-2 row-4" href="#heels" data-item="heels" aria-label="进入女士凉鞋分类">
        <img src="../assets/china-slices/card-heels.png" alt="">
      </a>
      <a class="card-link col-3 row-4" href="#bag" data-item="bag" aria-label="进入女士包包分类">
        <img src="../assets/china-slices/card-bag.png" alt="">
      </a>
    </main>

    <script>
      const cards = document.querySelectorAll(".card-link");

      cards.forEach((card) => {
        card.addEventListener("click", (event) => {
          event.preventDefault();
          cards.forEach((item) => item.classList.remove("is-active"));
          card.classList.add("is-active");
          history.replaceState(null, "", card.getAttribute("href"));
        });
      });
    </script>
  </body>
</html>
